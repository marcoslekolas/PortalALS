<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Customs Way · Control RPA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09101f;--surface:#101828;--surface2:#1a2540;--border:#1e3050;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --cw:#0ea5e9;--cw2:#0284c7;--accent:#2563eb;
  --mono:"IBM Plex Mono",monospace;--sans:"Syne",sans-serif;
  --r:6px;--rl:10px;
  --c-arch:#22c55e;--c-liq:#10b981;--c-eliq:#3b82f6;
  --c-prorroga:#8b5cf6;--c-urgente:#f97316;--c-vencido:#ef4444;
  --c-sinf:#64748b;--c-ok:#06b6d4;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:54px;z-index:200;background:rgba(9,16,31,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--cw),var(--accent));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff}
.logo-text{font-weight:800;font-size:14px}.logo-text span{color:var(--cw)}
.sep{width:1px;height:20px;background:var(--border)}
.hdr-mod{font-size:13px;font-weight:600;color:var(--text2)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-a{font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:4px 9px;border-radius:4px;transition:all .15s;text-decoration:none;border:1px solid transparent}
.hdr-a:hover{color:var(--cw);border-color:rgba(14,165,233,.3);background:rgba(14,165,233,.07)}
.hdr-date{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:6px}
#app{padding-top:54px;height:100vh;display:flex;flex-direction:column}
/* Stats */
#sbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.sp{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.sp:hover,.sp.on{border-color:currentColor;background:rgba(255,255,255,.03)}
.sp .dot{width:6px;height:6px;border-radius:50%}.sp .n{font-weight:600;color:var(--text)}
.gsep{flex:1}
.ginfo{display:flex;gap:16px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--text3)}
.ginfo strong{color:var(--text);font-size:12px}.gvr{color:var(--c-vencido)}.gvg{color:var(--c-arch)}
/* Toolbar */
#tb{padding:9px 18px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.sw{position:relative;flex:1;min-width:180px;max-width:300px}
.sw input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px 6px 30px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.sw input:focus{border-color:var(--cw)}.sw:before{content:"\2315";position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
select.ctl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 9px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;cursor:pointer}
select.ctl:focus{border-color:var(--cw)}
.btn{border:none;border-radius:var(--r);padding:6px 14px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.85}.btn-cw{background:var(--cw);color:#fff}.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-g:hover{color:var(--text);border-color:var(--cw)}.ml{margin-left:auto}
/* Tabla */
#tw{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
thead th{text-align:left;padding:8px 9px;font-family:var(--sans);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text2)}.sorted{color:var(--cw)!important}
tbody tr{border-bottom:1px solid rgba(30,48,80,.4);cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(26,37,64,.6)}.row-sel{background:rgba(14,165,233,.07)!important;border-left:2px solid var(--cw)}
td{padding:8px 9px;vertical-align:middle}.clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:600;font-family:var(--sans);white-space:nowrap}
.badge:before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
.b-archivado{background:rgba(34,197,94,.1);color:var(--c-arch)}.b-liquidado{background:rgba(16,185,129,.1);color:var(--c-liq)}
.b-e_liquidacion{background:rgba(59,130,246,.12);color:var(--c-eliq)}.b-prorroga{background:rgba(139,92,246,.12);color:var(--c-prorroga)}
.b-urgente{background:rgba(249,115,22,.15);color:var(--c-urgente)}.b-vencido{background:rgba(239,68,68,.12);color:var(--c-vencido)}
.b-sin_fecha{background:rgba(100,116,139,.1);color:var(--c-sinf)}.b-en_tiempo{background:rgba(6,182,212,.1);color:var(--c-ok)}
.dv{color:var(--c-vencido);font-weight:600}.du{color:var(--c-urgente);font-weight:600}.dok{color:var(--c-ok);font-weight:600}
.rchip{display:inline-block;background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2);border-radius:3px;padding:1px 5px;font-size:10px;margin:1px}
.echip{display:inline-block;background:rgba(16,185,129,.1);color:var(--c-liq);border:1px solid rgba(16,185,129,.25);border-radius:3px;padding:1px 5px;font-size:10px;margin:1px}
/* Panel */
#pnl{position:fixed;right:0;top:54px;bottom:0;width:480px;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:150;display:flex;flex-direction:column}
#pnl.open{transform:translateX(0)}
.ph{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.ph-dua{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:2px}
.ph-dos{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)}
.ph-cl{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.ph-x{position:absolute;right:14px;top:14px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;border-radius:4px}
.ph-x:hover{color:var(--text)}
.pb{padding:18px;display:flex;flex-direction:column;gap:14px;flex:1}
.ps{display:flex;flex-direction:column;gap:6px}
.plbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fb{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px}
.fbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.fbv{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500}
.sbox{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:12px;line-height:1.6;color:var(--text2)}
.pta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;color:var(--text);font-family:var(--mono);font-size:12px;resize:vertical;min-height:72px;outline:none;line-height:1.5}
.pta:focus{border-color:var(--cw)}
.psel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;cursor:pointer}
.psel:focus{border-color:var(--cw)}
.pbtn{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;text-align:left;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.pbtn:hover{border-color:var(--cw);color:var(--cw)}.pbtn.prim{background:var(--cw);border-color:var(--cw);color:#fff;justify-content:center}
.pbtn.prim:hover{opacity:.85;color:#fff}.pbtn.danger{color:var(--c-vencido)}.pbtn.danger:hover{border-color:var(--c-vencido)}
.exp-list{display:flex;flex-direction:column;gap:5px}
.exp-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;display:flex;align-items:center;gap:7px}
.exp-n{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--c-liq);flex:1}
.exp-m{font-size:11px;color:var(--text3)}
.exp-item button{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px}
.exp-item button:hover{color:var(--c-vencido)}
.add-row{display:flex;gap:5px;margin-top:4px}
.add-row input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 9px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.add-row input:focus{border-color:var(--cw)}.add-row input.fl{flex:2}.add-row input.fd{flex:1}
.add-row button{background:var(--cw);border:none;border-radius:var(--r);padding:7px 12px;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.desc-input{width:100%;margin-top:5px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 9px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.desc-input:focus{border-color:var(--cw)}
/* Modal */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
#ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:22px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:18px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mf{display:flex;flex-direction:column;gap:4px}.full{grid-column:1/-1}
.mf label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.mf input,.mf select,.mf textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:border-color .15s}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--cw)}
.mfoot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
/* Elix modal */
#ov-el{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
#ov-el.open{display:flex}
.elmod{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:720px;margin:auto}
.elh{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elh h2{font-size:15px;font-weight:700;flex:1}.elh button{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.elb{padding:20px}
.elp{background:#fff;color:#1a1a1a;border-radius:var(--r);padding:30px 38px;font-family:"Times New Roman",serif;font-size:13px;line-height:1.7;margin-bottom:14px;max-height:60vh;overflow-y:auto}
.elp h3{font-size:14px;text-align:center;margin-bottom:18px;font-weight:700}
.ep-datos{border:1px solid #ccc;padding:12px;margin:14px 0;font-size:12px}
.ep-datos h4{font-weight:700;margin-bottom:8px;text-decoration:underline}
.ep-row{display:flex;gap:14px;margin-bottom:4px}
.ep-k{width:175px;font-weight:600;flex-shrink:0}
.el-act{display:flex;gap:8px;justify-content:flex-end;padding:0 20px 16px}
/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){
  #pnl{width:100%;top:auto;bottom:0;height:88vh;transform:translateY(100%);border-left:none;border-top:1px solid var(--border);border-radius:12px 12px 0 0}
  #pnl.open{transform:translateY(0)}.ginfo{display:none}
}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo"><div class="logo-mark">CW</div><div class="logo-text"><span>Customs</span> Way</div></div>
  <div class="sep"></div>
  <div class="hdr-mod">Control RPA &middot; R&eacute;gimen 51</div>
  <div class="hdr-r">
    <a href="taric.html" class="hdr-a">&#9889; Clasificador TARIC</a>
    <a href="index_work.html" class="hdr-a">&#127981; Portal Alm&eacute;n</a>
    <span class="hdr-date" id="hdr-date"></span>
  </div>
</div>
<div id="app">
  <div id="sbar">
    <div class="sp on" onclick="setF('all',this)"><div class="dot" style="background:var(--text3)"></div><span class="n" id="n-all">0</span> Total</div>
    <div class="sp" onclick="setF('vencido',this)" style="color:var(--c-vencido)"><div class="dot" style="background:var(--c-vencido)"></div><span class="n" id="n-vencido">0</span> Vencidos</div>
    <div class="sp" onclick="setF('urgente',this)" style="color:var(--c-urgente)"><div class="dot" style="background:var(--c-urgente)"></div><span class="n" id="n-urgente">0</span> Urgente</div>
    <div class="sp" onclick="setF('e_liquidacion',this)" style="color:var(--c-eliq)"><div class="dot" style="background:var(--c-eliq)"></div><span class="n" id="n-e_liquidacion">0</span> E.Liquidaci&oacute;n</div>
    <div class="sp" onclick="setF('sin_fecha',this)" style="color:var(--c-sinf)"><div class="dot" style="background:var(--c-sinf)"></div><span class="n" id="n-sin_fecha">0</span> Sin fecha</div>
    <div class="sp" onclick="setF('en_tiempo',this)" style="color:var(--c-ok)"><div class="dot" style="background:var(--c-ok)"></div><span class="n" id="n-en_tiempo">0</span> En tiempo</div>
    <div class="sp" onclick="setF('prorroga',this)" style="color:var(--c-prorroga)"><div class="dot" style="background:var(--c-prorroga)"></div><span class="n" id="n-prorroga">0</span> Pr&oacute;rroga</div>
    <div class="sp" onclick="setF('archivado',this)" style="color:var(--c-arch)"><div class="dot" style="background:var(--c-arch)"></div><span class="n" id="n-archivado">0</span> Archivados</div>
    <div class="sp" onclick="setF('liquidado',this)" style="color:var(--c-liq)"><div class="dot" style="background:var(--c-liq)"></div><span class="n" id="n-liquidado">0</span> Liquidados</div>
    <div class="gsep"></div>
    <div class="ginfo">
      <span>Garant&iacute;a: <strong id="g-tot">30.000,00 &euro;</strong></span>
      <span>Comprometido: <strong class="gvr" id="g-used">0,00 &euro;</strong></span>
      <span>Disponible: <strong class="gvg" id="g-free">30.000,00 &euro;</strong></span>
    </div>
  </div>
  <div id="tb">
    <div class="sw"><input type="text" id="q" placeholder="DUA, dossier, cliente, RGE..." oninput="render()"></div>
    <select class="ctl" id="sel-cl" onchange="render()"><option value="">Todos los clientes</option></select>
    <select class="ctl" id="sel-reg" onchange="render()">
      <option value="">R&eacute;gimen</option>
      <option value="51">51 &mdash; Perf. Activo</option>
      <option value="5100">5100 &mdash; RPA</option>
      <option value="106">106 &mdash; Imp. Temporal</option>
    </select>
    <select class="ctl" id="sel-ord" onchange="render()">
      <option value="fecha_limite">&#8593; Fecha l&iacute;mite</option>
      <option value="dias_resto">&#8593; D&iacute;as restantes</option>
      <option value="dossier">&#8593; Dossier</option>
      <option value="cliente">&#8593; Cliente</option>
    </select>
    <button class="btn btn-cw ml" onclick="abrirNuevo()">+ Nueva RPA</button>
  </div>
  <div id="tw">
    <table>
      <thead><tr>
        <th onclick="srt('estado')">Estado</th>
        <th onclick="srt('dossier')">Dossier</th>
        <th onclick="srt('dua')">DUA Entrada</th>
        <th onclick="srt('cliente')">Cliente</th>
        <th onclick="srt('expedidor')">Expedidor</th>
        <th>DUAs Export.</th>
        <th onclick="srt('admision')">Admisi&oacute;n</th>
        <th onclick="srt('fecha_limite')">L&iacute;mite</th>
        <th onclick="srt('dias_resto')">D&iacute;as</th>
        <th onclick="srt('importe')">Importe</th>
        <th onclick="srt('regimen')">R&eacute;g.</th>
        <th>RGEs</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<!-- Panel lateral -->
<div id="pnl">
  <div class="ph">
    <button class="ph-x" onclick="cerrarP()">&#10005;</button>
    <div class="ph-dua" id="p-dua"></div>
    <div class="ph-dos" id="p-dos"></div>
    <div class="ph-cl" id="p-cl"></div>
    <div style="margin-top:8px" id="p-badge"></div>
  </div>
  <div class="pb" id="p-body"></div>
</div>
<!-- Modal nuevo/editar -->
<div id="ov">
  <div class="modal">
    <h2 id="m-title">Nueva RPA</h2>
    <div class="mg">
      <div class="mf full"><label>DUA Importaci&oacute;n *</label><input id="f-dua" placeholder="25ES001167300..."></div>
      <div class="mf"><label>N&ordm; Dossier</label><input type="number" id="f-dos" placeholder="171000"></div>
      <div class="mf"><label>R&eacute;gimen</label><select id="f-reg"><option value="51">51 &mdash; Perfeccionamiento Activo</option><option value="5100">5100 &mdash; RPA</option><option value="106">106 &mdash; Imp. Temporal</option></select></div>
      <div class="mf"><label>Fecha admisi&oacute;n</label><input type="date" id="f-adm"></div>
      <div class="mf"><label>Fecha l&iacute;mite ultimaci&oacute;n</label><input type="date" id="f-lim"></div>
      <div class="mf"><label>Valor en aduana (&euro;)</label><input type="number" step="0.01" id="f-val" placeholder="0.00"></div>
      <div class="mf"><label>Importe garantizado (&euro;)</label><input type="number" step="0.01" id="f-imp" placeholder="0.00"></div>
      <div class="mf"><label>C&oacute;digo NC mercader&iacute;a (10 d&iacute;gitos)</label><input id="f-nc" placeholder="8415820099" maxlength="10"></div>
      <div class="mf"><label>Coef. rendimiento (%)</label><input type="number" id="f-coef" placeholder="100" min="0" max="100"></div>
      <div class="mf"><label>Autorizaci&oacute;n</label><input id="f-aut" placeholder="SOLICITUD / 1020..."></div>
      <div class="mf full"><label>Descripci&oacute;n mercanc&iacute;a</label><input id="f-desc" placeholder="1 PALLET CONTENIENDO..."></div>
      <div class="mf"><label>Cliente</label><input id="f-cl" list="dl-cl"></div>
      <div class="mf"><label>Expedidor</label><input id="f-exp" placeholder="GIBDOCK"></div>
      <div class="mf full"><label>Destinatario</label><input id="f-dest" placeholder="IESA"></div>
      <div class="mf full"><label>Situaci&oacute;n / Anotaciones</label><textarea id="f-sit" rows="3" placeholder="SOLICITADO E LIQUIDACION RGE..."></textarea></div>
      <div class="mf"><label>Estado</label><select id="f-est">

}

      (r.situacion?'<div class="ep-row"><span class="ep-k">Observaciones:</span><span style="font-size:11px">'+r.situacion+'</span></div>':'')+
    '</div>'+
    '<p style="margin-top:16px">Por ello es por lo que <strong>SOLICITO</strong>:</p>'+
    '<p style="margin-top:8px;margin-bottom:32px">Que se ultime el Régimen de RPA y se reponga la garantía presentada.</p>'+

  document.getElementById('el-prev').innerHTML=html;
  document.getElementById('ov-el').classList.add('open');
}
