<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Expedición · ALS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #1e293b; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 20px; font-weight: 800; color: #3b82f6; letter-spacing: -0.5px; }
  .header-sub { font-size: 12px; color: #64748b; font-weight: 500; }
  .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #1e293b; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; }
  .card-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .exp-ref { font-size: 28px; font-weight: 900; color: #fff; font-family: monospace; letter-spacing: -0.5px; margin-bottom: 4px; }
  .exp-empresa { font-size: 15px; font-weight: 600; color: #94a3b8; }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-top: 12px; }
  .status-green { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
  .status-amber { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
  .status-red   { background: rgba(239,68,68,.15);  color: #f87171; border: 1px solid rgba(239,68,68,.3); }
  .status-blue  { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .data-key { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .data-val { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .ship-card { background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%); border: 1px solid #2563eb44; }
  .incidencias-list { list-style: none; }
  .incidencia-item { padding: 12px 0; border-bottom: 1px solid #1e293b; display: flex; gap: 10px; align-items: flex-start; }
  .incidencia-item:last-child { border-bottom: none; }
  .inc-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
  .inc-desc { font-size: 13px; color: #94a3b8; margin-top: 2px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { text-align: center; padding: 48px 24px; }
  .error-box .icon { font-size: 48px; margin-bottom: 16px; }
  .error-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #f87171; }
  .error-box p { font-size: 14px; color: #94a3b8; }
  .footer { text-align: center; padding: 24px; color: #475569; font-size: 12px; border-top: 1px solid #1e293b; margin-top: 24px; }
  .refresh-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 12px; }
  .refresh-btn:hover { background: #334155; }
  #last-update { font-size: 11px; color: #475569; margin-top: 8px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-logo">&#9875; ALS</div>
    <div class="header-sub">Algeciras Logistic Solutions &middot; Seguimiento</div>
  </div>
</div>
<div class="container">
  <div id="content"><div class="spinner"></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://bccqfqaehbmmqbisfbyv.supabase.co';
const SB_KEY = 'sb_publishable_tHKTtGyJmYQVnp66v1Dfjw_pCyyrLx1';
const sb = supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:false}});

function renderError(msg) {
  document.getElementById('content').innerHTML =
    '<div class="error-box"><div class="icon">&#128269;</div><h2>Expedici\u00f3n no encontrada</h2><p>' + msg + '</p></div>';
}

function semToClass(s) {
  if (!s) return 'status-blue';
  if (s.includes('\uD83D\uDFE2')) return 'status-green';
  if (s.includes('\uD83D\uDFE1') || s.includes('\uD83D\uDFE0')) return 'status-amber';
  if (s.includes('\uD83D\uDD34')) return 'status-red';
  return 'status-blue';
}

function fmtFecha(d) {
  if (!d) return '\u2014';
  try { return new Date(d).toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch(e) { return d; }
}

function render(exp, incs) {
  var sem = exp['estado_semaforo'] || '';
  var buque = exp.buques || {};
  var empresa = exp.empresas || {};
  var nref = exp['\u00ba_expedicion'] || exp['nº_expedicion'] || '—';
  var nmrn = exp['\u00ba_mrn'] || exp['nº_mrn'] || '';
  var semClass = semToClass(sem);

  var incHtml = '';
  if (incs && incs.length > 0) {
    var items = incs.map(function(i) {
      return '<li class="incidencia-item"><span style="font-size:18px;flex-shrink:0">&#9888;&#65039;</span><div>' +
        '<div class="inc-name">' + (i.nombre||'Incidencia') + '</div>' +
        (i.descripcion ? '<div class="inc-desc">' + i.descripcion + '</div>' : '') +
        (i.estado ? '<div style="font-size:11px;font-weight:700;margin-top:4px;color:#fbbf24">' + i.estado + '</div>' : '') +
        '</div></li>';
    }).join('');
    incHtml = '<div class="card"><div class="card-label">&#9888;&#65039; Incidencias (' + incs.length + ')</div><ul class="incidencias-list">' + items + '</ul></div>';
  }

  var mrn = nmrn ? '<div class="data-item" style="grid-column:1/-1"><div class="data-key">MRN</div><div class="data-val">' + nmrn + '</div></div>' : '';
  var sta = exp.status_aduanero ? '<div class="data-item" style="grid-column:1/-1"><div class="data-key">Estado aduanero</div><div class="data-val">' + exp.status_aduanero + '</div></div>' : '';

  document.getElementById('content').innerHTML =
    '<div class="card">' +
      '<div class="card-label">Referencia de expedici\u00f3n</div>' +
      '<div class="exp-ref">' + nref + '</div>' +
      '<div class="exp-empresa">' + (empresa.nombre||'\u2014') + '</div>' +
      '<div class="status-badge ' + semClass + '">' + (sem || '&#128203; En proceso') + '</div>' +
      '<div class="data-grid">' +
        '<div class="data-item"><div class="data-key">Bultos</div><div class="data-val">' + (exp.bultos||0) + '</div></div>' +
        '<div class="data-item"><div class="data-key">Kilos</div><div class="data-val">' + (exp.kilos ? exp.kilos+' kg' : '\u2014') + '</div></div>' +
        '<div class="data-item"><div class="data-key">Ubicaci\u00f3n</div><div class="data-val">&#128205; ' + (exp.ubicacion||'Sin ubicar') + '</div></div>' +
        '<div class="data-item"><div class="data-key">Estado carga</div><div class="data-val">' + (exp.estado_carga||'\u2014') + '</div></div>' +
        mrn + sta +
      '</div>' +
    '</div>' +
    '<div class="card ship-card">' +
      '<div class="card-label">&#128674; Buque</div>' +
      '<div class="data-val" style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px">' + (buque.nombre||'\u2014') + '</div>' +
      '<div class="data-grid"><div class="data-item"><div class="data-key">ETA</div><div class="data-val">' + fmtFecha(buque.eta_buque) + '</div></div></div>' +
    '</div>' +
    incHtml +
    '<div style="text-align:center">' +
      '<button class="refresh-btn" onclick="location.reload()">&#128260; Actualizar</button>' +
      '<div id="last-update">&#128338; ' + new Date().toLocaleTimeString('es-ES') + '</div>' +
    '</div>' +
    '<div class="footer">Algeciras Logistic Solutions &middot; als@alsalgeciras.com &middot; +34 956 58 13 16<br>' +
    '<span style="color:#334155">Informaci\u00f3n en tiempo real &middot; Solo consulta</span></div>';
}

function renderAWB(e) {
  document.getElementById('content').innerHTML =
    '<div class="card"><div class="card-label">&#9992;&#65039; Expedici\u00f3n Aeropuerto</div>' +
    '<div class="exp-ref">' + (e.awb||e.numero_vuelo||'\u2014') + '</div>' +
    '<div class="exp-empresa">' + (e.consignatario||'\u2014') + '</div>' +
    '<div class="data-grid">' +
      '<div class="data-item"><div class="data-key">Estado</div><div class="data-val">' + (e.estado||'\u2014') + '</div></div>' +
      '<div class="data-item"><div class="data-key">Fecha llegada</div><div class="data-val">' + fmtFecha(e.fecha_llegada) + '</div></div>' +
      '<div class="data-item"><div class="data-key">Bultos</div><div class="data-val">' + (e.bultos||0) + '</div></div>' +
      '<div class="data-item"><div class="data-key">Kilos</div><div class="data-val">' + (e.kilos ? e.kilos+' kg' : '\u2014') + '</div></div>' +
    '</div></div>' +
    '<div style="text-align:center"><button class="refresh-btn" onclick="location.reload()">&#128260; Actualizar</button></div>' +
    '<div class="footer">Algeciras Logistic Solutions &middot; als@alsalgeciras.com &middot; +34 956 58 13 16</div>';
}

async function init() {
  var params = new URLSearchParams(window.location.search);
  var expId = params.get('exp');
  var awbId = params.get('awb');

  if (!expId && !awbId) {
    renderError('No se especific\u00f3 ninguna expedici\u00f3n en el enlace.');
    return;
  }

  if (awbId) {
    try {
      var r = await sb.from('airport_cargo').select('*').eq('id', awbId).single();
      if (r.error || !r.data) { renderError('No se encontr\u00f3 el AWB solicitado.'); return; }
      renderAWB(r.data);
      setInterval(async function() {
        var fr = await sb.from('airport_cargo').select('*').eq('id', awbId).single();
        if (fr.data) renderAWB(fr.data);
      }, 120000);
    } catch(e) {
      renderError('Error al cargar los datos.');
    }
    return;
  }

  try {
    var results = await Promise.all([
      sb.from('expediciones').select('*,buques(nombre,eta_buque),empresas!empresa_id(nombre)').eq('id', expId).single(),
      sb.from('incidencias').select('nombre,descripcion,estado').eq('expedicion_id', expId)
    ]);
    var exp = results[0].data;
    var err = results[0].error;
    var incs = results[1].data;

    if (err || !exp) {
      renderError('No se encontr\u00f3 la expedici\u00f3n solicitada.');
      console.error('Error Supabase:', err);
      return;
    }

    render(exp, incs);

    setInterval(async function() {
      var r2 = await Promise.all([
        sb.from('expediciones').select('*,buques(nombre,eta_buque),empresas!empresa_id(nombre)').eq('id', expId).single(),
        sb.from('incidencias').select('nombre,descripcion,estado').eq('expedicion_id', expId)
      ]);
      if (r2[0].data) render(r2[0].data, r2[1].data);
      var lu = document.getElementById('last-update');
      if (lu) lu.textContent = '\u23f1\ufe0f ' + new Date().toLocaleTimeString('es-ES');
    }, 120000);

  } catch(e) {
    renderError('Error al cargar los datos. Int\u00e9ntelo de nuevo.');
    console.error(e);
  }
}

init();
</script>
</body>
</html>
