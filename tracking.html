<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Seguimiento de Expedición · ALS Algeciras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;
  --navy2:#0f2040;
  --blue:#1a56db;
  --blue2:#2563eb;
  --cyan:#06b6d4;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --slate:#64748b;
  --slate2:#94a3b8;
  --border:#1e3a5f;
  --card:#0d1f38;
  --card2:#112240;
  --white:#f0f6ff;
  --f:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{min-height:100vh;background:var(--navy);color:var(--white);font-family:var(--f);font-size:15px;line-height:1.6}

/* ── Fondo animado ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(26,86,219,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(6,182,212,.12) 0%, transparent 60%),
    linear-gradient(180deg, #0a1628 0%, #061020 100%);
  pointer-events:none;
}

/* ── Grid dots ── */
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}

.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:32px 20px 64px}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:16px;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.hdr-logo{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;letter-spacing:.5px;flex-shrink:0;box-shadow:0 0 20px rgba(26,86,219,.4)}
.hdr-info h1{font-size:16px;font-weight:700;color:var(--white);letter-spacing:.2px}
.hdr-info p{font-size:12px;color:var(--slate2);margin-top:2px}
.hdr-spacer{flex:1}
.hdr-time{font-size:11px;color:var(--slate2);font-family:var(--mono);text-align:right}

/* ── Estado hero ── */
.status-hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.status-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:20px 20px 0 0}
.status-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;color:#34d399;margin-bottom:16px}
.status-badge.amber{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fbbf24}
.status-badge.blue{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:#60a5fa}
.status-badge.red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#f87171}
.status-badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.hero-ref{font-size:26px;font-weight:700;color:var(--white);letter-spacing:-.5px;margin-bottom:4px;font-family:var(--mono)}
.hero-buque{font-size:14px;color:var(--slate2);margin-bottom:20px}
.hero-buque span{color:var(--cyan);font-weight:600}

.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.hero-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px}
.hero-stat-val{font-size:20px;font-weight:700;color:var(--white);font-family:var(--mono)}
.hero-stat-lbl{font-size:11px;color:var(--slate2);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* ── Timeline ── */
.section-title{font-size:11px;font-weight:600;color:var(--slate2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;margin-top:28px}

.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--blue) 0%,var(--border) 100%)}

.tl-item{position:relative;margin-bottom:20px;animation:fadeUp .4s ease both}
.tl-item:nth-child(1){animation-delay:.1s}
.tl-item:nth-child(2){animation-delay:.2s}
.tl-item:nth-child(3){animation-delay:.3s}
.tl-item:nth-child(4){animation-delay:.4s}
.tl-item:nth-child(5){animation-delay:.5s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.tl-dot{position:absolute;left:-24px;top:14px;width:14px;height:14px;border-radius:50%;background:var(--blue);border:2px solid var(--navy);box-shadow:0 0 10px rgba(26,86,219,.6)}
.tl-dot.active{background:var(--cyan);box-shadow:0 0 14px rgba(6,182,212,.7);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(6,182,212,.6)}50%{box-shadow:0 0 20px rgba(6,182,212,.9)}}
.tl-dot.done{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.4)}
.tl-dot.pending{background:var(--border);box-shadow:none}

.tl-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.tl-card.active{border-color:rgba(6,182,212,.4);background:var(--card2)}
.tl-card.pending{opacity:.5}
.tl-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tl-card-title{font-size:14px;font-weight:600;color:var(--white)}
.tl-card-time{font-size:11px;color:var(--slate2);font-family:var(--mono)}
.tl-card-desc{font-size:13px;color:var(--slate2);line-height:1.5}

/* ── Datos ── */
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.data-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.data-row.full{grid-column:1/-1}
.data-lbl{font-size:11px;color:var(--slate2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.data-val{font-size:14px;font-weight:600;color:var(--white);font-family:var(--mono)}
.data-val.normal{font-family:var(--f)}

/* ── Incidencias ── */
.inc-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:14px 16px;margin-top:8px}
.inc-title{font-size:13px;font-weight:600;color:#f87171;margin-bottom:4px}
.inc-desc{font-size:12px;color:rgba(248,113,113,.8);line-height:1.5}

/* ── Footer ── */
.footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center}
.footer-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px}
.footer-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.footer-logo-name{font-size:14px;font-weight:700;color:var(--white)}
.footer-contact{font-size:12px;color:var(--slate2);line-height:2}
.footer-contact a{color:var(--cyan);text-decoration:none}

/* ── Loading / Error ── */
.state-box{text-align:center;padding:80px 20px}
.state-icon{font-size:48px;margin-bottom:16px;display:block}
.state-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:8px}
.state-desc{font-size:14px;color:var(--slate2);max-width:320px;margin:0 auto}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:480px){
  .hero-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .hero-stat-val{font-size:16px}
  .data-grid{grid-template-columns:1fr 1fr}
  .hero-ref{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">ALS</div>
    <div class="hdr-info">
      <h1>Seguimiento de Expedición</h1>
      <p>Algeciras Logistic Solutions</p>
    </div>
    <div class="hdr-spacer"></div>
    <div class="hdr-time" id="hdr-time"></div>
  </div>

  <!-- Contenido dinámico -->
  <div id="root">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Cargando expedición…</div>
      <div class="state-desc">Consultando el estado de su mercancía</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-logo">
      <div class="footer-logo-mark">ALS</div>
      <div class="footer-logo-name">Algeciras Logistic Solutions</div>
    </div>
    <div class="footer-contact">
      📞 <a href="tel:+34956581316">+34 956 58 13 16</a> · 
      ✉️ <a href="mailto:als@alsalgeciras.com">als@alsalgeciras.com</a><br>
      Operations 24/7 · Boardings <a href="tel:+34664074940">+34 664 07 49 40</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://bccqfqaehbmmqbisfbyv.supabase.co';
const SB_KEY = 'sb_publishable_tHKTtGyJmYQVnp66v1Dfjw_pCyyrLx1';
const sb = supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:false}});

// ── Reloj ─────────────────────────────────────────────────────────────
function tick(){
  const now = new Date();
  document.getElementById('hdr-time').innerHTML =
    now.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) +
    '<br>' + now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick, 60000);

// ── Mapeo de estados ──────────────────────────────────────────────────
const ESTADOS = [
  { key:'transito',    label:'En tránsito',          icon:'🚢', desc:'La mercancía está en tránsito hacia el puerto de Algeciras.' },
  { key:'esperando',   label:'Esperando almacén',     icon:'⌛', desc:'La mercancía ha llegado al puerto y está pendiente de entrada en almacén.' },
  { key:'ubicada',     label:'Recibida en almacén',   icon:'📦', desc:'La mercancía está ubicada en nuestro almacén y en proceso de trámite.' },
  { key:'revisar',     label:'En revisión',           icon:'🔍', desc:'La expedición requiere revisión documental o física.' },
  { key:'autorizado',  label:'Autorizado despacho',   icon:'✅', desc:'El despacho aduanero ha sido autorizado. La mercancía está lista para retirada.' },
  { key:'cargado',     label:'Cargado en camión',     icon:'🚛', desc:'La mercancía ha sido cargada y está en camino a su destino.' },
  { key:'embarcado',   label:'Embarcado',             icon:'⚓', desc:'La mercancía ha sido embarcada.' },
];

function semaforo2key(s){
  if(!s) return 'transito';
  if(s.includes('TRÁNSITO')) return 'transito';
  if(s.includes('ESPERANDO')) return 'esperando';
  if(s.includes('UBICADA')) return 'ubicada';
  if(s.includes('REVISAR')) return 'revisar';
  if(s.includes('AUTORIZADO')) return 'autorizado';
  if(s.includes('CARGADO')) return 'cargado';
  if(s.includes('EMBARCADO') || s.includes('Landed')) return 'embarcado';
  return 'transito';
}

function badgeClass(key){
  if(['autorizado','embarcado','cargado'].includes(key)) return '';
  if(['revisar'].includes(key)) return 'red';
  if(['ubicada'].includes(key)) return 'blue';
  return 'amber';
}

// ── Render ────────────────────────────────────────────────────────────
function render(exp, incs){
  const key = semaforo2key(exp.estado_semaforo);
  const idx = ESTADOS.findIndex(e=>e.key===key);
  const estado = ESTADOS[idx] || ESTADOS[0];
  const buque = exp.buques || {};
  const empresa = exp.empresas || {};

  const fmt = (d) => d ? new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const fmtDt = (d) => d ? new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : null;

  // Timeline
  const tlHtml = ESTADOS.map((e,i) => {
    const done = i < idx;
    const active = i === idx;
    const pending = i > idx;
    const dotClass = active ? 'active' : done ? 'done' : 'pending';
    const cardClass = active ? 'active' : pending ? 'pending' : '';
    return `
      <div class="tl-item">
        <div class="tl-dot ${dotClass}"></div>
        <div class="tl-card ${cardClass}">
          <div class="tl-card-top">
            <div class="tl-card-title">${e.icon} ${e.label}</div>
            ${active ? `<div class="tl-card-time">ACTUAL</div>` : ''}
          </div>
          ${active ? `<div class="tl-card-desc">${e.desc}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  // Incidencias
  const incHtml = (incs||[]).filter(i=>i.estado!=='Cerrada').map(i=>`
    <div class="inc-card">
      <div class="inc-title">⚠️ ${i.nombre||'Incidencia'}</div>
      <div class="inc-desc">${i.descripcion||''}</div>
    </div>`).join('');

  document.getElementById('root').innerHTML = `
    <!-- Hero -->
    <div class="status-hero">
      <div class="status-badge ${badgeClass(key)}">
        <span class="dot"></span>
        ${estado.icon} ${estado.label}
      </div>
      <div class="hero-ref">${exp.nº_expedicion || '—'}</div>
      <div class="hero-buque">Buque: <span>${buque.nombre || '—'}</span></div>
      <div class="hero-grid">
        <div class="hero-stat">
          <div class="hero-stat-val">${exp.bultos ?? '—'}</div>
          <div class="hero-stat-lbl">Bultos</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${exp.kilos != null ? Number(exp.kilos).toLocaleString('es-ES') : '—'}</div>
          <div class="hero-stat-lbl">Kilos</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${exp.ubicacion ? exp.ubicacion.split(' ')[0] : '—'}</div>
          <div class="hero-stat-lbl">Ubicación</div>
        </div>
      </div>
    </div>

    ${incHtml ? `<div class="section-title">⚠️ Incidencias activas</div>${incHtml}` : ''}

    <!-- Timeline -->
    <div class="section-title">📍 Estado del envío</div>
    <div class="timeline">${tlHtml}</div>

    <!-- Datos de la expedición -->
    <div class="section-title">📋 Detalle de la expedición</div>
    <div class="data-grid">
      <div class="data-row">
        <div class="data-lbl">Referencia</div>
        <div class="data-val">${exp.nº_expedicion || '—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">MRN</div>
        <div class="data-val">${exp.nº_mrn || '—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Trámite aduanero</div>
        <div class="data-val normal">${exp.tramite_aduanero || '—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Status aduanero</div>
        <div class="data-val normal">${exp.status_aduanero || '—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Mercancía</div>
        <div class="data-val normal">${exp.descripcion_mercancia || '—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">ETA Buque</div>
        <div class="data-val">${fmt(buque.eta_buque)}</div>
      </div>
      ${exp.fecha_max_despacho ? `
      <div class="data-row">
        <div class="data-lbl">Fecha máx. despacho</div>
        <div class="data-val">${fmt(exp.fecha_max_despacho)}</div>
      </div>` : ''}
      ${exp.fecha_aviso_cliente ? `
      <div class="data-row">
        <div class="data-lbl">Último aviso</div>
        <div class="data-val">${fmt(exp.fecha_aviso_cliente)}</div>
      </div>` : ''}
      <div class="data-row full">
        <div class="data-lbl">Ubicación actual</div>
        <div class="data-val normal">${exp.ubicacion || '—'}</div>
      </div>
    </div>
  `;
}

function renderError(msg){
  document.getElementById('root').innerHTML = `
    <div class="state-box">
      <span class="state-icon">⚓</span>
      <div class="state-title">Expedición no encontrada</div>
      <div class="state-desc">${msg || 'No se encontró información para esta expedición. Contacte con ALS Algeciras.'}</div>
    </div>`;
}

// ── Render Airport Cargo ──────────────────────────────────────────────
const STATUS_AWB = {
  'T1':  {label:'T1 — En tránsito',        icon:'✈️',  color:'blue'},
  'EXA': {label:'EXA — Exportación',        icon:'📤',  color:'blue'},
  'IMP': {label:'IMP — Importación',        icon:'📥',  color:'amber'},
  'DUA': {label:'DUA presentado',           icon:'📋',  color:'amber'},
  'LEV': {label:'Levantado',               icon:'✅',  color:''},
  'ENT': {label:'Entregado',               icon:'🚛',  color:''},
};

function renderAWB(e){
  const st = STATUS_AWB[e.status] || {label: e.status||'—', icon:'📦', color:'blue'};
  const fmt = d => d ? new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : '—';

  // Timeline airport cargo
  const AWB_ESTADOS = [
    {label:'Llegada al aeropuerto', icon:'✈️',  desc:'La mercancía ha llegado al aeropuerto de origen.'},
    {label:'En handling',           icon:'🏭',  desc:`En gestión con ${e.handler||'el handler'}.`},
    {label:'Trámite aduanero',      icon:'📋',  desc:'En proceso de despacho aduanero.'},
    {label:'Levantado',             icon:'✅',  desc:'Despacho autorizado. Mercancía lista para retirada.'},
    {label:'Entregado',             icon:'🚛',  desc:'Mercancía entregada al consignatario.'},
  ];

  const statusIdx = {'T1':1,'EXA':1,'IMP':2,'DUA':2,'LEV':3,'ENT':4};
  const idx = statusIdx[e.status] ?? 1;

  const tlHtml = AWB_ESTADOS.map((s,i) => {
    const done = i < idx, active = i === idx, pending = i > idx;
    return `
      <div class="tl-item">
        <div class="tl-dot ${active?'active':done?'done':'pending'}"></div>
        <div class="tl-card ${active?'active':pending?'pending':''}">
          <div class="tl-card-top">
            <div class="tl-card-title">${s.icon} ${s.label}</div>
            ${active?'<div class="tl-card-time">ACTUAL</div>':''}
          </div>
          ${active?`<div class="tl-card-desc">${s.desc}</div>`:''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('root').innerHTML = `
    <div class="status-hero">
      <div class="status-badge ${st.color}">
        <span class="dot"></span>
        ${st.icon} ${st.label}
      </div>
      <div class="hero-ref">${e.awb || '—'}</div>
      <div class="hero-buque">✈️ Airport Cargo · <span>${e.aeropuerto||'AGP'}</span>${e.buque?` · Buque: <span>${e.buque}</span>`:''}</div>
      <div class="hero-grid">
        <div class="hero-stat">
          <div class="hero-stat-val">${e.bultos??'—'}</div>
          <div class="hero-stat-lbl">Bultos</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${e.kilos_tasables!=null?Number(e.kilos_tasables).toLocaleString('es-ES'):'—'}</div>
          <div class="hero-stat-lbl">Kg tasables</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${e.handler||'—'}</div>
          <div class="hero-stat-lbl">Handler</div>
        </div>
      </div>
    </div>

    <div class="section-title">📍 Estado del envío</div>
    <div class="timeline">${tlHtml}</div>

    <div class="section-title">📋 Detalle AWB</div>
    <div class="data-grid">
      <div class="data-row">
        <div class="data-lbl">AWB</div>
        <div class="data-val">${e.awb||'—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Status aduanero</div>
        <div class="data-val normal">${e.status||'—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Consignatario</div>
        <div class="data-val normal">${e.consignatario||'—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Aeropuerto</div>
        <div class="data-val">${e.aeropuerto||'—'}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Fecha llegada</div>
        <div class="data-val">${fmt(e.fecha_llegada)}</div>
      </div>
      <div class="data-row">
        <div class="data-lbl">Fecha retirada</div>
        <div class="data-val">${fmt(e.fecha_retirada)}</div>
      </div>
      ${e.observaciones?`
      <div class="data-row full">
        <div class="data-lbl">Observaciones</div>
        <div class="data-val normal">${e.observaciones}</div>
      </div>`:''}
    </div>
  `;
}

// ── Main ──────────────────────────────────────────────────────────────
async function main(){
  const params = new URLSearchParams(window.location.search);
  const expId = params.get('exp');
  const awbId = params.get('awb');

  if(!expId && !awbId){
    renderError('No se especificó ninguna expedición en el enlace.');
    return;
  }

  // ── Modo Airport Cargo ──
  if(awbId){
    try {
      const {data:e, error} = await sb.from('airport_cargo').select('*').eq('id', awbId).single();
      if(error || !e){ renderError('No se encontró el AWB solicitado.'); return; }
      renderAWB(e);
      setInterval(async () => {
        const {data:fresh} = await sb.from('airport_cargo').select('*').eq('id', awbId).single();
        if(fresh) renderAWB(fresh);
      }, 120000);
    } catch(e) {
      renderError('Error al cargar los datos. Inténtelo de nuevo.');
      console.error(e);
    }
    return;
  }

  // ── Modo Expedición portuaria ──
  try {
    const [{data:exp, error}, {data:incs}] = await Promise.all([
      sb.from('expediciones')
        .select('*,buques(nombre,eta_buque),empresas(nombre)')
        .eq('id', expId)
        .single(),
      sb.from('incidencias')
        .select('nombre,descripcion,estado')
        .eq('expedicion_id', expId)
    ]);

    if(error || !exp){
      renderError('No se encontró la expedición solicitada.');
      return;
    }

    render(exp, incs);

    setInterval(async () => {
      const {data:fresh} = await sb.from('expediciones')
        .select('*,buques(nombre,eta_buque),empresas(nombre)')
        .eq('id', expId).single();
      const {data:freshIncs} = await sb.from('incidencias')
        .select('nombre,descripcion,estado').eq('expedicion_id', expId);
      if(fresh) render(fresh, freshIncs);
    }, 120000);

  } catch(e) {
    renderError('Error al cargar los datos. Inténtelo de nuevo.');
    console.error(e);
  }
}

main();
</script>
</body>
</html>
